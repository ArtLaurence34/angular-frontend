<div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0">Manage Accounts</h5>
</div>

<table class="table table-striped">
    <thead>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Verified</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        @for (account of accounts; track account.id) {
            <tr>
                <td>{{ account.firstName }} {{ account.lastName }}</td>
                <td>{{ account.email }}</td>
                <td>{{ account.role }}</td>
                <td>{{ account.verified ? 'Yes' : 'No' }}</td>
                <td>
                    <a [routerLink]="['edit', account.id]" class="btn btn-sm btn-primary me-1">Edit</a>
                    <button (click)="deleteAccount(account.id)" class="btn btn-danger btn-sm"
                        [disabled]="account.isDeleting">
                        @if (account.isDeleting) {
                            <span class="spinner-border spinner-border-sm"></span>
                        }
                        Delete
                    </button>
                </td>
            </tr>
        } @empty {
            <tr>
                <td colspan="5" class="text-center">Loading...</td>
            </tr>
        }
    </tbody>
</table>
